<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UmiData</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./css/cadastro.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-logo">
            <img src="./assets/imgs/logo2.png" alt="Logo">
            UmiData
        </div>
        <ul class="nav-links">
            <li><a href="./index.html">Página Inicial </a></li>
            <li><a href="./login.html">Login </a></li>
            <div class="cursor1">
                <li><a href="./cadastro.html" class="active">Cadastro</a></li>
            </div>
        </ul>
    </nav>

    <main class="main-content">
        <div class="card">
            <header class="topo-container">
                <div class="topo-logo">
                    <img src="./assets/imgs/logo2.png" alt="Logo">
                    UmiData
                </div>
                <h2>Cadastro de Usuários</h2>
            </header>

            <form class="inputs">
                <div class="input"><i class="fas fa-user"></i><input type="text" class="forma-input" placeholder="Nome">
                </div>
                <div class="input"><i class="fas fa-user"></i><input type="text" class="forma-input"
                        placeholder="Sobrenome"></div>
                <div class="input"><i class="fas fa-id-card"></i><input type="number" class="forma-input"
                        placeholder="CNPJ"></div>
                <div class="input"><i class="fas fa-th-large"></i><input type="text" class="forma-input"
                        placeholder="Setor"></div>
                <div class="input"><i class="fas fa-briefcase"></i><input type="text" class="forma-input"
                        placeholder="Cargo"></div>
                <div class="input"><i class="fas fa-map-marker-alt"></i><input type="text" class="forma-input"
                        placeholder="Estado (UF)"></div>
                <div class="input"><i class="fas fa-envelope"></i><input type="email" class="forma-input"
                        placeholder="Email"></div>
                <div class="input"><i class="fas fa-phone"></i><input type="tel" class="forma-input"
                        placeholder="Telefone"></div>
                <div class="input"><i class="fas fa-lock"></i><input type="password" class="forma-input"
                        placeholder="Senha"></div>
                <div class="input"><i class="fas fa-lock"></i><input type="password" class="forma-input"
                        placeholder="Confirmar Senha"></div>

                <div class="container-acao">
                    <button type="submit" class="btn-cadastro">
                        CADASTRAR - SE
                        <div class="circle-arrow"><i class="fas fa-arrow-right"></i></div>
                    </button>
                    <div class="login-link">
                        Já tem uma conta? <a href="./login.html">Entrar</a>
                    </div>
                </div>
            </form>
        </div>
    </main>

</body>

</html>
