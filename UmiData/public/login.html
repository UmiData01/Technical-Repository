<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UmiData</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

    <div class="navbar">
        <div class="nav-logo">
            <img src="./assets/imgs/logo2.png" alt="Logo">
            UmiData
        </div>
        <i class="fas fa-bars menu-hamburguer" onclick="barra()"></i>
       
        <ul class="nav-links">
            <li><a href="./index.html">Página Inicial</a></li>
            <div class="cursor1">
            <li><a href="./login.html">Login</a></li>
            </div>
            <li><a href="./cadastro.html" class="active">Cadastro</a></li>
        </ul>
    </div>

    <div id="sidebar" class="sidebar">
    <i class="fas fa-times btn-fechar" onclick="barra()"></i>
    <ul class="sidebar-links">
        <li><a href="./index.html">Página Inicial</a></li>
        <li><a href="./login.html">Login</a></li>
        <li><a href="./cadastro.html">Cadastro</a></li>
    </ul>
</div>

    <div class="box">
        <div class="cartao-login">
            <div class="cabecalho-cartao">
                <div class="topo">
                    <img src="./assets/imgs/logo2.png" alt="Logo">
                    <h1>UmiData</h1>
                </div>
                <h2>Login de Usuários</h2>
                <hr class="divisor-cabecalho">
            </div>

            <div class="box-inputs">
                <div class="inputs">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" placeholder="Seu email">
                </div>

                <div class="inputs">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <input type="password" placeholder="Sua senha">
                </div>

                <button type="submit" class="btn-entrar">Entrar</button>
                
                <p class="registro">Ainda não tem uma conta? <a href="cadastro.html">Registre-se</a></p>
            </div>
        </div>
    </div>
</body>
</html>
<script>
   function barra() {
    const sidebar = document.getElementById("sidebar");
    
    if (sidebar.style.width === "250px") {
        sidebar.style.width = "0";
    } else {
        sidebar.style.width = "250px";
    }

}
</script>
