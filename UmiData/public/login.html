<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UmiData</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./css/login.css">
</head>

<body>

    <div class="navbar">
        <div class="nav-logo">
            <img src="./assets/imgs/logo2.png" alt="Logo">
            UmiData
        </div>
        <i class="fas fa-bars menu-hamburguer" onclick="barra()"></i>

        <ul class="nav-links">
            <li><a href="./index.html">Página Inicial</a></li>
            <div class="cursor1">
                <li><a href="./login.html">Login</a></li>
            </div>
            <li><a href="./cadastro.html" class="active">Cadastro</a></li>
        </ul>
    </div>

    <div id="sidebar" class="sidebar">
        <i class="fas fa-times btn-fechar" onclick="barra()"></i>
        <ul class="sidebar-links">
            <li><a href="./index.html">Página Inicial</a></li>
            <li><a href="./login.html">Login</a></li>
            <li><a href="./cadastro.html">Cadastro</a></li>
        </ul>
    </div>

    <div class="box">
        <div class="cartao-login">
            <div class="cabecalho-cartao">
                <div class="topo">
                    <img src="./assets/imgs/logo2.png" alt="Logo">
                    <h1>UmiData</h1>
                </div>
                <h2>Login de Usuários</h2>
                <hr class="divisor-cabecalho">
            </div>

            <div class="box-inputs">
                <div class="inputs">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="Seu email">
                    <span id="erroEmail" class="erro"></span>
                </div>

                <div class="inputs">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <input type="password" id="senha" placeholder="Sua senha">
                    <span id="erroSenha" class="erro"></span>
                </div>

                <button type="button" class="btn-entrar" onclick="entrar()">Entrar</button>

                <p class="registro">Ainda não tem uma conta? <a href="cadastro.html">Registre-se</a></p>
            </div>
        </div>
    </div>
</body>

</html>
<script>

    function barra() {
        const sidebar = document.getElementById("sidebar");

        if (sidebar.style.width === "250px") {
            sidebar.style.width = "0";
        } else {
            sidebar.style.width = "250px";
        }

    }
    function entrar() {

    var email = document.getElementById("email").value;
    var senha = document.getElementById("senha").value;

    var erroEmail = document.getElementById("erroEmail");
    var erroSenha = document.getElementById("erroSenha");

    erroEmail.textContent = "";
    erroSenha.textContent = "";

    var valido = true;

    // 🔹 Validação de email
    if (email.trim() === "") {
        erroEmail.textContent = "Digite seu email. Ex: usuario@email.com";
        valido = false;
    } else if (!email.includes("@") || !email.includes(".")) {
        erroEmail.textContent = "Email inválido";
        valido = false;
    } else if (email.length > 45) {
        erroEmail.textContent = "Email muito longo";
        valido = false;
    }

    // 🔹 Validação de senha
    if (senha === "") {
        erroSenha.textContent = "Digite sua senha";
        valido = false;
    } else if (senha.length < 8) {
        erroSenha.textContent = "Senha deve ter no mínimo 8 caracteres";
        valido = false;
    } else if (senha.length > 16) {
        erroSenha.textContent = "Senha muito longa";
        valido = false;
    }

    // 🔴 Se inválido, para aqui
    if (!valido) {
        return false;
    }

    // 🔥 Integração com API
    fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            emailServer: email,
            senhaServer: senha
        })
    })
    .then(function (resposta) {

        console.log("Resposta recebida:", resposta);

        if (resposta.ok) {

            resposta.json().then(json => {

                console.log(json);

                // 🔐 Sessão
                sessionStorage.EMAIL_USUARIO = json.email;
                sessionStorage.NOME_USUARIO = json.nome;
                sessionStorage.ID_USUARIO = json.idUsuario;

                // 🔄 Redirecionamento
                setTimeout(function () {
                    window.location = "./dashboard/dashboard.html";
                }, 1000);

            });

        } else {

            console.log("Erro ao logar");

            resposta.text().then(() => {
                erroSenha.textContent = "Email ou senha inválidos";
            });

        }

    })
    .catch(function (erro) {
        console.error(erro);
        erroSenha.textContent = "Erro ao conectar com o servidor";
    });

    return false;
}
</script>
